<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="36" fill="#070c18"/>
  <rect x="1" y="1" width="178" height="178" rx="35" stroke="#d4aa60" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- antenna -->
  <line x1="90" y1="38" x2="90" y2="55" stroke="#d4aa60" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
  <circle cx="90" cy="33" r="5" fill="#d4aa60" fill-opacity="0.9"/>

  <!-- head -->
  <rect x="54" y="56" width="72" height="54" rx="12" fill="#d4aa60" fill-opacity="0.12" stroke="#d4aa60" stroke-width="2" stroke-opacity="0.7"/>

  <!-- eyes -->
  <circle cx="75" cy="80" r="8" fill="#d4aa60" fill-opacity="0.25"/>
  <circle cx="75" cy="80" r="4.5" fill="#d4aa60" fill-opacity="0.9"/>
  <circle cx="105" cy="80" r="8" fill="#d4aa60" fill-opacity="0.25"/>
  <circle cx="105" cy="80" r="4.5" fill="#d4aa60" fill-opacity="0.9"/>

  <!-- mouth -->
  <rect x="70" y="96" width="40" height="5" rx="2.5" fill="#d4aa60" fill-opacity="0.6"/>

  <!-- body -->
  <rect x="60" y="116" width="60" height="40" rx="10" fill="#d4aa60" fill-opacity="0.1" stroke="#d4aa60" stroke-width="2" stroke-opacity="0.55"/>

  <!-- body button -->
  <circle cx="90" cy="136" r="6" fill="#d4aa60" fill-opacity="0.5"/>

  <!-- arms -->
  <rect x="36" y="120" width="18" height="10" rx="5" fill="#d4aa60" fill-opacity="0.45"/>
  <rect x="126" y="120" width="18" height="10" rx="5" fill="#d4aa60" fill-opacity="0.45"/>

  <!-- legs -->
  <rect x="68" y="158" width="14" height="14" rx="5" fill="#d4aa60" fill-opacity="0.45"/>
  <rect x="98" y="158" width="14" height="14" rx="5" fill="#d4aa60" fill-opacity="0.45"/>

  <!-- star dots -->
  <circle cx="30" cy="36" r="1.2" fill="#ffffff" fill-opacity="0.3"/>
  <circle cx="150" cy="48" r="1" fill="#d4aa60" fill-opacity="0.4"/>
  <circle cx="152" cy="148" r="1.2" fill="#ffffff" fill-opacity="0.25"/>
</svg>
